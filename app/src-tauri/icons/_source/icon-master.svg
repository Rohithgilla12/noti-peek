<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <clipPath id="squircle">
      <path d="M 512,0
               C 109.75,0 0,109.75 0,512
               C 0,914.25 109.75,1024 512,1024
               C 914.25,1024 1024,914.25 1024,512
               C 1024,109.75 914.25,0 512,0 Z"/>
    </clipPath>

    <linearGradient id="plate" x1="512" y1="0" x2="512" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#221e18"/>
      <stop offset="1" stop-color="#16130e"/>
    </linearGradient>

    <linearGradient id="tophilite" x1="512" y1="0" x2="512" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#squircle)">
    <rect width="1024" height="1024" fill="url(#plate)"/>
    <rect width="1024" height="1024" fill="url(#tophilite)"/>
  </g>

  <circle cx="512" cy="512" r="294.5" fill="none" stroke="#d8cfbf" stroke-width="46"/>

  <circle cx="685" cy="412" r="72" fill="#e8a83e"/>
</svg>
