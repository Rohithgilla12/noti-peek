name = "noti-peek-api"
main = "src/index.ts"
compatibility_date = "2025-01-15"

[vars]
ENVIRONMENT = "development"
APP_URL = "http://localhost:8787"
ENABLE_EXPERIMENTAL_PROVIDERS = "false"

[[d1_databases]]
binding = "DB"
database_name = "noti-peek-db"
database_id = "placeholder-will-be-replaced-after-d1-create"

[observability]
[observability.logs]
enabled = true
invocation_logs = true

[env.production.vars]
ENVIRONMENT = "production"
# Shipping on the default workers.dev subdomain for beta. When the custom
# api.notipeek.dev domain goes live, switch APP_URL here AND update every
# provider's OAuth callback URL to match.
APP_URL = "https://noti-peek-api-production.rohithgilla.workers.dev"
ENABLE_EXPERIMENTAL_PROVIDERS = "true"

[[env.production.d1_databases]]
binding = "DB"
database_name = "noti-peek-db-production"
database_id = "386fa500-ee68-4d6d-8dff-4fee70b5a7a1"
