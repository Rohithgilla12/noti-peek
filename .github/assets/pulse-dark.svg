<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 720" role="img" aria-label="noti-peek — pulse view, dark theme">
  <title>noti-peek — pulse view</title>
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Chivo:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&display=swap');

      :root {
        --win: oklch(0.18 0.01 80);
        --win-elev: oklch(0.22 0.01 80);
        --win-elev-2: oklch(0.25 0.01 80);
        --bg-sel: oklch(0.25 0.01 80);
        --line: oklch(0.35 0.01 80);
        --line-soft: oklch(0.28 0.01 80);
        --ink-1: oklch(0.85 0.01 80);
        --ink-2: oklch(0.70 0.01 80);
        --ink-3: oklch(0.55 0.01 80);
        --ink-4: oklch(0.45 0.01 80);
        --accent: oklch(0.90 0.02 80);
        --accent-ink: oklch(0.18 0.01 80);
      }

      .win        { fill: var(--win); }
      .win-elev   { fill: var(--win-elev); }
      .win-elev-2 { fill: var(--win-elev-2); }
      .line       { stroke: var(--line); stroke-width: 1; fill: none; }
      .line-soft  { stroke: var(--line-soft); stroke-width: 1; fill: none; }
      .ink-1      { fill: var(--ink-1); }
      .ink-2      { fill: var(--ink-2); }
      .ink-3      { fill: var(--ink-3); }
      .ink-4      { fill: var(--ink-4); }
      .accent     { fill: var(--accent); }
      .accent-ink { fill: var(--accent-ink); }

      .f-body  { font-family: 'Chivo', sans-serif; }
      .f-mono  { font-family: 'JetBrains Mono', monospace; }
      .f-disp  { font-family: 'JetBrains Mono', monospace; font-style: italic; }

      .cap     { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 500; }
      .meta    { font-size: 12px; letter-spacing: 0.02em; }
      .row-t   { font-size: 14px; font-weight: 500; }
      .row-s   { font-size: 13px; }
      .title   { font-size: 20px; font-weight: 500; letter-spacing: -0.01em; }
      .body    { font-size: 14px; line-height: 1.5; }
      .brand   { font-size: 15px; font-weight: 500; letter-spacing: 0.02em; }
      .tab     { font-size: 13px; letter-spacing: 0.02em; font-weight: 500; }
      .hint    { font-size: 12px; letter-spacing: 0.01em; }
      .big-num { font-size: 32px; font-weight: 500; letter-spacing: -0.02em; }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .cursor {
        animation: blink 1s step-end infinite;
      }
    ]]></style>
    <clipPath id="winp">
      <rect x="0" y="0" width="1120" height="720" rx="12" ry="12"/>
    </clipPath>
  </defs>

  <g clip-path="url(#winp)">
    <rect width="1120" height="720" class="win"/>

    <!-- top nav -->
    <rect x="0" y="0" width="1120" height="52" class="win-elev"/>
    <line x1="0" y1="52" x2="1120" y2="52" class="line-soft"/>
    
    <circle cx="22" cy="26" r="6" fill="#ff5f56" stroke="#e0443e" stroke-width="0.5"/>
    <circle cx="42" cy="26" r="6" fill="#ffbd2e" stroke="#dea123" stroke-width="0.5"/>
    <circle cx="62" cy="26" r="6" fill="#27c93f" stroke="#1da831" stroke-width="0.5"/>
    
    <text x="96" y="31" class="f-mono brand ink-1">noti<tspan class="f-disp" dx="0">peek</tspan><tspan class="cursor" dx="2" fill="var(--accent)">_</tspan></text>
    
    <g transform="translate(470, 0)">
      <rect x="0" y="12" width="180" height="28" rx="4" class="win-elev-2"/>
      <rect x="90" y="14" width="88" height="24" rx="2" fill="var(--bg-sel)" stroke="var(--line-soft)" stroke-width="1"/>
      <text x="46" y="31" text-anchor="middle" class="f-mono tab ink-3">inbox</text>
      <text x="134" y="31" text-anchor="middle" class="f-mono tab ink-1">pulse</text>
    </g>

    <!-- stats strip -->
    <g transform="translate(48, 88)">
      <text x="0" y="14" class="f-mono cap ink-3">This week</text>

      <g transform="translate(0, 36)">
        <text x="0"   y="32" class="f-mono big-num ink-1">47</text>
        <text x="0"   y="58" class="f-mono cap ink-3">reviewed</text>

        <text x="170" y="32" class="f-mono big-num ink-1">12</text>
        <text x="170" y="58" class="f-mono cap ink-3">merged</text>

        <text x="310" y="32" class="f-mono big-num ink-1">4</text>
        <text x="310" y="58" class="f-mono cap ink-3">still open</text>

        <text x="470" y="32" class="f-mono big-num ink-1">2h 14m</text>
        <text x="470" y="58" class="f-mono cap ink-3">median response</text>

        <text x="700" y="32" class="f-mono big-num ink-1">38%</text>
        <text x="700" y="58" class="f-mono cap ink-3">bundled</text>

        <text x="860" y="32" class="f-mono big-num ink-1">0</text>
        <text x="860" y="58" class="f-mono cap ink-3">overdue</text>
      </g>
    </g>

    <line x1="48" y1="212" x2="1072" y2="212" class="line-soft"/>

    <!-- sparkline bars: notifications by day -->
    <g transform="translate(48, 236)">
      <text x="0" y="12" class="f-mono cap ink-3">Activity · last 14 days</text>
      <g transform="translate(0, 36)">
        <!-- bars -->
        <g fill="var(--line-soft)">
          <rect x="0"   y="48" width="24" height="40" rx="2"/>
          <rect x="40"  y="36" width="24" height="52" rx="2"/>
          <rect x="80"  y="24" width="24" height="64" rx="2"/>
          <rect x="120" y="42" width="24" height="46" rx="2"/>
          <rect x="160" y="68" width="24" height="20" rx="2"/>
          <rect x="200" y="74" width="24" height="14" rx="2"/>
          <rect x="240" y="20" width="24" height="68" rx="2"/>
          <rect x="280" y="32" width="24" height="56" rx="2"/>
          <rect x="320" y="50" width="24" height="38" rx="2"/>
          <rect x="360" y="30" width="24" height="58" rx="2"/>
          <rect x="400" y="16" width="24" height="72" rx="2"/>
        </g>
        <!-- today highlight -->
        <rect x="440" y="0" width="24" height="88" fill="var(--accent)" rx="2"/>
        <g fill="var(--line-soft)">
          <rect x="480" y="40" width="24" height="48" rx="2"/>
          <rect x="520" y="58" width="24" height="30" rx="2"/>
        </g>
        <!-- labels -->
        <g class="f-mono hint ink-4">
          <text x="4"   y="112">mon</text>
          <text x="204" y="112">sat</text>
          <text x="404" y="112">thu</text>
          <text x="524" y="112">sun</text>
        </g>
      </g>
    </g>

    <line x1="48" y1="392" x2="1072" y2="392" class="line-soft"/>

    <!-- most-active repos / projects -->
    <g transform="translate(48, 416)">
      <text x="0" y="12" class="f-mono cap ink-3">Top sources · 14 days</text>

      <g class="f-body" transform="translate(0, 48)">
        <!-- row 1 -->
        <text x="0"   y="0"  class="row-t ink-1">Rohithgilla12/noti-peek</text>
        <rect x="380" y="-12" width="380" height="12" rx="3" fill="var(--bg-sel)"/>
        <rect x="380" y="-12" width="326" height="12" rx="3" fill="var(--ink-2)"/>
        <text x="780" y="0"  class="f-mono row-s ink-2">86%</text>
        <text x="860" y="0"  class="f-mono row-s ink-3">41 notifs</text>

        <!-- row 2 -->
        <text x="0"   y="36" class="row-t ink-1">fusang-group/platform</text>
        <rect x="380" y="24" width="380" height="12" rx="3" fill="var(--bg-sel)"/>
        <rect x="380" y="24" width="152" height="12" rx="3" fill="var(--ink-2)"/>
        <text x="780" y="36" class="f-mono row-s ink-2">40%</text>
        <text x="860" y="36" class="f-mono row-s ink-3">19 notifs</text>

        <!-- row 3 -->
        <text x="0"   y="72" class="row-t ink-1">tauri-apps/plugins-workspace</text>
        <rect x="380" y="60" width="380" height="12" rx="3" fill="var(--bg-sel)"/>
        <rect x="380" y="60" width="84"  height="12" rx="3" fill="var(--ink-3)"/>
        <text x="780" y="72" class="f-mono row-s ink-2">22%</text>
        <text x="860" y="72" class="f-mono row-s ink-3">11 notifs</text>

        <!-- row 4 -->
        <text x="0"   y="108" class="row-t ink-2">linear · ENG</text>
        <rect x="380" y="96" width="380" height="12" rx="3" fill="var(--bg-sel)"/>
        <rect x="380" y="96" width="63"  height="12" rx="3" fill="var(--ink-3)"/>
        <text x="780" y="108" class="f-mono row-s ink-2">16%</text>
        <text x="860" y="108" class="f-mono row-s ink-3">8 notifs</text>

        <!-- row 5 -->
        <text x="0"   y="144" class="row-t ink-2">jira · PEEK</text>
        <rect x="380" y="132" width="380" height="12" rx="3" fill="var(--bg-sel)"/>
        <rect x="380" y="132" width="38"  height="12" rx="3" fill="var(--ink-3)"/>
        <text x="780" y="144" class="f-mono row-s ink-2">10%</text>
        <text x="860" y="144" class="f-mono row-s ink-3">5 notifs</text>
      </g>
    </g>

    <!-- footer -->
    <rect x="0" y="680" width="1120" height="40" class="win-elev"/>
    <line x1="0" y1="680" x2="1120" y2="680" class="line-soft"/>
    <text x="24" y="705" class="f-mono hint ink-3">pulse · rolling 14-day window · recomputes hourly</text>
    <text x="1096" y="705" text-anchor="end" class="f-mono hint ink-3">v0.4.0</text>
  </g>
</svg>