name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.1). Required when triggered manually."
        required: true
        type: string

# Source stays private in this repo; the signed DMG + updater JSON ship from
# Rohithgilla12/noti-peek-releases (public) so browsers and the Tauri updater
# can fetch without auth. Cross-repo uploads use RELEASES_REPO_TOKEN (a fine-
# grained PAT scoped to contents:write on the releases repo only).
env:
  RELEASES_REPO: Rohithgilla12/noti-peek-releases

permissions:
  contents: read

jobs:
  release:
    name: Build + sign + notarize (macOS aarch64)
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - name: Resolve tag
        id: resolve_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

      - name: Install frontend dependencies
        working-directory: app
        run: bun install --frozen-lockfile

      - name: Build + sign + notarize
        id: tauri_build
        uses: tauri-apps/tauri-action@v0
        env:
          # Tauri updater signing (generated via `bun x @tauri-apps/cli signer generate`)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

          # macOS code signing (Developer ID Application cert)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}

          # Apple notarization (app-specific password flow)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: app
          args: --target aarch64-apple-darwin
          # No tagName → tauri-action builds but does NOT create a release in
          # the current (private) repo. We publish to the public releases repo
          # in the next step. `artifactPaths` is still populated as an output.

      - name: Create or reuse draft release on public repo
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
          TAG: ${{ steps.resolve_tag.outputs.tag }}
        run: |
          if gh release view "$TAG" --repo "$RELEASES_REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists on $RELEASES_REPO — reusing."
          else
            gh release create "$TAG" --repo "$RELEASES_REPO" --draft \
              --title "noti-peek $TAG" \
              --notes "See https://github.com/Rohithgilla12/noti-peek for the changelog. The auto-updater will pull this release on existing installs."
          fi

      - name: Upload build artifacts to public release
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
          TAG: ${{ steps.resolve_tag.outputs.tag }}
          ARTIFACTS_JSON: ${{ steps.tauri_build.outputs.artifactPaths }}
        run: |
          echo "Artifacts produced by tauri-action:"
          echo "$ARTIFACTS_JSON" | jq -r '.[]'

          echo "$ARTIFACTS_JSON" | jq -r '.[]' | while read -r file; do
            [ -f "$file" ] || { echo "  skipping (missing): $file"; continue; }
            echo "  uploading: $(basename "$file")"
            gh release upload "$TAG" "$file" --repo "$RELEASES_REPO" --clobber
          done

      - name: Generate & upload latest.json (updater manifest)
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
          TAG: ${{ steps.resolve_tag.outputs.tag }}
          ARTIFACTS_JSON: ${{ steps.tauri_build.outputs.artifactPaths }}
        run: |
          APP_TARBALL=$(echo "$ARTIFACTS_JSON" | jq -r '.[] | select(endswith(".app.tar.gz"))' | head -1)
          SIG_FILE="${APP_TARBALL}.sig"

          if [ ! -f "$APP_TARBALL" ] || [ ! -f "$SIG_FILE" ]; then
            echo "Error: expected .app.tar.gz + .sig"
            echo "  APP_TARBALL=$APP_TARBALL (exists=$([ -f "$APP_TARBALL" ] && echo y || echo n))"
            echo "  SIG_FILE=$SIG_FILE (exists=$([ -f "$SIG_FILE" ] && echo y || echo n))"
            exit 1
          fi

          URL="https://github.com/${RELEASES_REPO}/releases/download/${TAG}/$(basename "$APP_TARBALL")"

          # Tauri's updater parses `version` with strict semver — strip the leading
          # `v` from the git tag so "v0.1.1" becomes "0.1.1", otherwise the client
          # silently rejects the manifest.
          SEMVER="${TAG#v}"

          jq -n \
            --arg version   "$SEMVER" \
            --arg notes     "noti-peek $TAG" \
            --arg pub_date  "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --rawfile sig   "$SIG_FILE" \
            --arg url       "$URL" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": {
                  signature: $sig,
                  url: $url
                }
              }
            }' > latest.json

          cat latest.json | jq .  # echo for debugging

          gh release upload "$TAG" latest.json --repo "$RELEASES_REPO" --clobber

      - name: Publish the release (draft → public)
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
          TAG: ${{ steps.resolve_tag.outputs.tag }}
        run: |
          gh release edit "$TAG" --repo "$RELEASES_REPO" --draft=false
          echo "Published: https://github.com/$RELEASES_REPO/releases/tag/$TAG"

# When you re-enable Intel (macos-15-intel), convert `release` back to a matrix
# job and add a merge step that combines per-arch latest-<arch>.json files into
# a single latest.json with both platforms in the platforms map. See commented
# matrix entry below for the starting point.
